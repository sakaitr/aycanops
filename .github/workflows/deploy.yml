name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Copy assets into standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r migrations .next/standalone/migrations

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.agno.digital
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: .next/standalone/
          server-dir: /aycanops.agno.digital/
          exclude: |
            **/.env
            **/tmp/**
            **/.git/**

      - name: Restart app via cPanel API
        run: |
          curl -s -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cpanel.agno.digital:2083/execute/Fileman/save_file_content" \
            --data-urlencode "dir=/home/agnowzbg/aycanops.agno.digital/tmp" \
            --data-urlencode "file=restart.txt" \
            --data-urlencode "content=$(date -u)" \
            -o /dev/null -w "cPanel restart: %{http_code}\n"

