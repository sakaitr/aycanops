name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Copy assets into standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r migrations .next/standalone/migrations

      - name: Package standalone as zip
        run: |
          cd .next/standalone
          zip -r ../../bundle.zip . -x "**/.env" -x "**/.env.*"
          cd ../..
          echo "Bundle size: $(du -sh bundle.zip)"

      - name: Upload bundle via lftp (FTPS)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" ftp.agno.digital <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set ftp:fix-pasv-address true
          set net:timeout 120
          set net:max-retries 3
          put bundle.zip -o /aycanops.agno.digital/bundle.zip
          bye
          EOF

      - name: Extract & restart via cPanel API
        run: |
          echo "Extracting bundle on server..."
          RESULT=$(curl -s -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            -X POST "https://cpanel.agno.digital:2083/execute/Fileman/extract_archive" \
            --data-urlencode "dir=/home/agnowzbg/aycanops.agno.digital" \
            --data-urlencode "files-0=bundle.zip" \
            -w "\nHTTP_CODE:%{http_code}")
          echo "Extract result: $RESULT"

          echo "Restarting Node.js app..."
          curl -s -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cpanel.agno.digital:2083/execute/Fileman/save_file_content" \
            --data-urlencode "dir=/home/agnowzbg/aycanops.agno.digital/tmp" \
            --data-urlencode "file=restart.txt" \
            --data-urlencode "content=$(date -u)" \
            -o /dev/null -w "Restart: HTTP %{http_code}\n"

