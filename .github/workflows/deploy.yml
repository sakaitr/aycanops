name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Copy assets into standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r migrations .next/standalone/migrations

      - name: Check what changed
        id: changes
        run: |
          # Detect if migrations or public changed vs previous commit
          git diff HEAD~1 --name-only 2>/dev/null | grep -q '^migrations/' \
            && echo "migrations=true" >> $GITHUB_OUTPUT \
            || echo "migrations=false" >> $GITHUB_OUTPUT
          git diff HEAD~1 --name-only 2>/dev/null | grep -q '^public/' \
            && echo "public=true" >> $GITHUB_OUTPUT \
            || echo "public=false" >> $GITHUB_OUTPUT

      - name: Deploy via lftp (only changed files)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
          PUBLIC_CHANGED: ${{ steps.changes.outputs.public }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" ftp.agno.digital <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set ftp:fix-pasv-address true
          set net:timeout 120
          set net:max-retries 3
          set mirror:parallel-transfer-count 8
          mirror -R --delete --ignore-time .next/standalone/.next/ /aycanops.agno.digital/.next/
          mirror -R --ignore-time .next/standalone/migrations/ /aycanops.agno.digital/migrations/
          $([ "$PUBLIC_CHANGED" = "true" ] && echo 'mirror -R --delete --ignore-time .next/standalone/public/ /aycanops.agno.digital/public/')
          put .next/standalone/server.js -o /aycanops.agno.digital/server.js
          put .next/standalone/package.json -o /aycanops.agno.digital/package.json
          bye
          EOF

      - name: Restart app via cPanel API
        run: |
          curl -s -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cpanel.agno.digital:2083/execute/Fileman/save_file_content" \
            --data-urlencode "dir=/home/agnowzbg/aycanops.agno.digital/aycanops.agno.digital/tmp" \
            --data-urlencode "file=restart.txt" \
            --data-urlencode "content=$(date -u)" \
            -o /dev/null -w "Restart: HTTP %{http_code}\n"

