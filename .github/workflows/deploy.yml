name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Copy assets into standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r migrations .next/standalone/migrations

      - name: Deploy via lftp mirror (incremental)
        env:
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" ftp.agno.digital <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set ftp:fix-pasv-address true
          set net:timeout 120
          set net:max-retries 3
          set mirror:parallel-transfer-count 5
          mirror -R --delete --verbose \
            --exclude-glob=.env \
            --exclude-glob=.env.* \
            --exclude-glob=tmp/ \
            --exclude-glob=restart.txt \
            .next/standalone/ /aycanops.agno.digital/
          bye
          EOF

      - name: Restart app via cPanel API
        run: |
          curl -s -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cpanel.agno.digital:2083/execute/Fileman/save_file_content" \
            --data-urlencode "dir=/home/agnowzbg/aycanops.agno.digital/aycanops.agno.digital/tmp" \
            --data-urlencode "file=restart.txt" \
            --data-urlencode "content=$(date -u)" \
            -o /dev/null -w "Restart: HTTP %{http_code}\n"

