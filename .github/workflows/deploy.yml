name: Build & Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/sakaitr/aycanops:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aycanops

            # Repo'yu güncelle (nginx config, docker-compose.yml vb.)
            git pull origin main

            # Yeni image'ı çek
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u sakaitr --password-stdin
            docker compose pull app

            # Yeniden başlat (db ve nginx dokunma, sadece app)
            docker compose up -d --no-deps app

            # Eski image'ları temizle
            docker image prune -f

            echo "✅ Deploy tamamlandı: $(date)"

